<!DOCTYPE html>
<html>
<head>
    <title>Clear Records</title>
</head>
<body>
    <h1>Clearing Records...</h1>
    <script>
        localStorage.removeItem('applicationHistory');
        localStorage.removeItem('results');
        localStorage.clear();
        alert('All 7 application records have been cleared!');
        document.body.innerHTML = '<h1 style="color: green;">✓ All records cleared successfully!</h1><p>You can close this window and refresh your application.</p>';
    </script>
</body>
</html>
